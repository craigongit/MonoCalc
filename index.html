<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Trading position size and leverage calculator">
    <title>MonoCalc</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; min-height: 100vh; padding: 1rem; }
        .container { max-width: 28rem; margin: 0 auto; background: white; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: bold; color: #1f2937; margin-bottom: 1.5rem; text-align: center; }
        .params-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1.5rem; }
        .params-label { font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem; font-weight: 500; }
        .params-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
        input[type="number"] { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 1rem; }
        input[type="number"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .button-group { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
        button { flex: 1; padding: 0.5rem 1rem; border: none; border-radius: 0.375rem; font-weight: 500; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .calc-btn { background: #2563eb; color: white; }
        .calc-btn:hover { background: #1d4ed8; }
        .clear-btn { background: #6b7280; color: white; }
        .clear-btn:hover { background: #4b5563; }
        .results-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 0.5rem; padding: 1rem; display: none; }
        .results-box.show { display: block; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .results-header h3 { font-weight: 500; color: #1f2937; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 500; }
        .badge.long { background: #dcfce7; color: #166534; }
        .badge.short { background: #fee2e2; color: #991b1b; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
        .result-label { font-size: 0.875rem; color: #6b7280; }
        .result-value { font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MonoCalc</h1>
        
        <div class="params-box">
            <div class="params-label">Risk Parameters</div>
            <div class="params-inputs">
                <div>
                    <label>Risk ($)</label>
                    <input type="number" id="risk" placeholder="Risk" step="0.01">
                </div>
                <div>
                    <label>Margin ($)</label>
                    <input type="number" id="margin" placeholder="Margin" step="0.01">
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Entry Price</label>
            <input type="number" id="entryPrice" placeholder="Enter entry price" step="0.01">
        </div>

        <div class="input-group">
            <label>Stop Loss Price</label>
            <input type="number" id="slPrice" placeholder="Enter stop loss price" step="0.01">
        </div>

        <div class="button-group">
            <button class="calc-btn" onclick="calculate()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="2" width="16" height="20" rx="2" />
                    <line x1="8" y1="6" x2="16" y2="6" />
                    <line x1="16" y1="14" x2="16" y2="18" />
                    <line x1="8" y1="14" x2="8" y2="18" />
                    <line x1="12" y1="14" x2="12" y2="18" />
                </svg>
                Calculate
            </button>
            <button class="clear-btn" onclick="clearAll()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
                Clear
            </button>
        </div>

        <div class="results-box" id="results">
            <div class="results-header">
                <h3>Results</h3>
                <span class="badge" id="positionBadge"></span>
            </div>
            <div class="result-row">
                <span class="result-label">Leverage:</span>
                <span class="result-value" id="leverage"></span>
            </div>
        </div>
    </div>

    <script>
        // Load saved parameters
        const savedRisk = localStorage.getItem('risk');
        const savedMargin = localStorage.getItem('margin');
        
        if (savedRisk) document.getElementById('risk').value = savedRisk;
        if (savedMargin) document.getElementById('margin').value = savedMargin;

        function calculate() {
            const risk = parseFloat(document.getElementById('risk').value);
            const margin = parseFloat(document.getElementById('margin').value);
            const entry = parseFloat(document.getElementById('entryPrice').value);
            const sl = parseFloat(document.getElementById('slPrice').value);

            if (!risk || !margin) {
                alert('Please enter risk and margin values');
                return;
            }

            if (!entry || !sl || entry === sl) {
                alert('Please enter valid entry and stop loss prices (entry ≠ SL)');
                return;
            }

            // Save parameters
            localStorage.setItem('risk', risk);
            localStorage.setItem('margin', margin);

            const priceDiff = Math.abs(entry - sl);
            const leverage = (risk * entry) / (priceDiff * margin);
            const positionType = entry > sl ? 'Long' : 'Short';

            document.getElementById('leverage').textContent = leverage.toFixed(4);
            
            const badge = document.getElementById('positionBadge');
            badge.textContent = positionType;
            badge.className = 'badge ' + positionType.toLowerCase();

            document.getElementById('results').classList.add('show');
        }

        function clearAll() {
            document.getElementById('entryPrice').value = '';
            document.getElementById('slPrice').value = '';
            document.getElementById('results').classList.remove('show');
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
        }
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000"/>
  <!-- Candlestick chart design -->
  <line x1="20" y1="30" x2="20" y2="70" stroke="#fff" stroke-width="2"/>
  <rect x="15" y="40" width="10" height="20" fill="#fff"/>
  
  <line x1="40" y1="20" x2="40" y2="65" stroke="#fff" stroke-width="2"/>
  <rect x="35" y="25" width="10" height="25" fill="#fff"/>
  
  <line x1="60" y1="35" x2="60" y2="75" stroke="#fff" stroke-width="2"/>
  <rect x="55" y="45" width="10" height="20" fill="#fff"/>
  
  <line x1="80" y1="25" x2="80" y2="60" stroke="#fff" stroke-width="2"/>
  <rect x="75" y="30" width="10" height="20" fill="#fff"/>
  
  <!-- Trend line -->
  <line x1="15" y1="65" x2="85" y2="35" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3"/>
</svg>